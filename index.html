<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>SL Maps</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:40px;background:#0b1020;color:#e8edf7}a{color:#8fc2ff;display:block;margin:12px 0;font-size:20px}.subtle{color:#a9b5d1}.meta{margin:16px 0;padding:10px 12px;border:1px solid #283556;border-radius:10px;background:#11182d;color:#a9b5d1;display:inline-block}.meta b{color:#e8edf7}</style></head><body><h1>SL local maps</h1><p class="subtle">Static export of the locally-built SL transport maps with street and satellite basemaps.</p><div class="meta" id="projectMeta">Version loading…</div><a href="/destinations.html">Destinations map</a><a href="/all-points.html">All stop points map</a><script>function f(v){const d=new Date(v);return Number.isNaN(d.getTime())?v:d.toLocaleString(undefined,{dateStyle:"medium",timeStyle:"short"})}fetch("/data/version.json",{cache:"no-store"}).then(r=>r.json()).then(m=>{document.getElementById("projectMeta").innerHTML=`<b>${m.version||"unversioned"}</b> · published ${f(m.published_at)} · branch ${m.source_branch||"main"}`}).catch(()=>{document.getElementById("projectMeta").textContent="Version metadata unavailable"})</script></body></html>
